<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Daftar Lahan Pertanian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --soil:    #3B2A1A; --leaf:    #2D6A2F; --leaf-lt: #4CAF50;
      --sun:     #E8A020; --sun-lt:  #FFC94D; --sky:     #D6EAF8;
      --cream:   #F9F5EE; --mist:    #EEE9DF; --text:    #1A1208;
      --muted:   #7A6A52; --danger:  #C0392B; --border:  #C8B89A;
      --radius:  14px;    --shadow:  0 2px 12px rgba(59,42,26,0.10);
    }
    body { font-family: 'Noto Sans', sans-serif; background: var(--cream); color: var(--text); padding-bottom: 32px; }
    header { background: var(--leaf); padding: 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); color: #fff; }
    .card { background: #fff; margin: 16px 16px 0; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .card-head { background: var(--mist); padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--soil); }
    .card-body { padding: 16px; }
    .field { margin-bottom: 16px; }
    input[type=text], select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; }
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill-group input { display: none; }
    .pill-group label { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 30px; cursor: pointer; }
    .pill-group input:checked + label { background: var(--leaf); color: #fff; border-color: var(--leaf); }
    #getGpsBtn { width: 100%; padding: 12px; background: var(--leaf); color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    #saveBtn { width: 100%; padding: 16px; background: var(--leaf); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
    #saveBtn:disabled { background: var(--border); }
    #successScreen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    #successScreen.visible { display: flex; }
    .success-card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; max-width: 320px; width: 100%; }
    .error-msg { display: none; color: var(--danger); font-size: 0.8rem; }
    .error-msg.show { display: block; }
    .en { font-size: 0.75rem; color: #888; }
  </style>
</head>
<body>

<header>
  <h1>Daftar Lahan <span class="en">Farm Register</span></h1>
</header>

<div class="card">
  <div class="card-head">👤 Data Petani</div>
  <div class="card-body">
    <div class="field">
      <label>Nama Petani</label>
      <input type="text" id="farmerName" placeholder="Nama lengkap">
      <div class="error-msg" id="err-name">Wajib diisi</div>
    </div>
    <div class="field">
      <label>Jenis Tanaman</label>
      <select id="cropType">
        <option value="">-- Pilih --</option>
        <option value="kakao">Kakao</option>
        <option value="jagung">Jagung</option>
        <option value="padi">Padi</option>
      </select>
    </div>
    <div class="field">
        <label>Status</label>
        <div class="pill-group">
            <input type="radio" name="growth" id="g1" value="bibit"><label for="g1">Bibit</label>
            <input type="radio" name="growth" id="g2" value="panen"><label for="g2">Panen</label>
        </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <button id="getGpsBtn" onclick="getGPS()">📡 Ambil Lokasi GPS</button>
    <div id="gpsCoords" style="margin-top:10px; font-family: monospace;">Belum diambil</div>
  </div>
</div>

<div class="card" id="saveSection">
    <button id="saveBtn" onclick="saveData()" disabled>💾 Simpan Data</button>
</div>

<div id="successScreen">
  <div class="success-card">
    <h2>Sukses!</h2>
    <button onclick="location.reload()">Selesai</button>
  </div>
</div>

<script>
  let currentLat = null, currentLng = null;

  function getGPS() {
    navigator.geolocation.getCurrentPosition(pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      document.getElementById('gpsCoords').textContent = currentLat + ", " + currentLng;
      document.getElementById('saveBtn').disabled = false;
    });
  }

  async function saveData() {
    const data = {
      timestamp: new Date().toISOString(),
      farmerName: document.getElementById('farmerName').value,
      cropLabel: document.getElementById('cropType').value,
      growthStage: document.querySelector('input[name="growth"]:checked')?.value || '',
      droughtLevel: '0',
      latitude: currentLat,
      longitude: currentLng
    };

    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyVSsETKnS6HkBItZb9y5Pgdp8JiJxGvpFcRDuMyX1Yv2rMsCLo5Kw7ONqDoWwRbOpyIA/exec';
    
    try {
      const res = await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors', // これをno-corsにすると401エラーを回避しやすいです
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      document.getElementById('successScreen').classList.add('visible');
    } catch (e) {
      alert("Error: " + e);
    }
  }
</script>
</body>
</html>
